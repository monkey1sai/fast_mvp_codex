services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulse-ingestor-api
    env_file:
      - .env
    environment:
      PULSE_DB_PATH: ${PULSE_DB_PATH:-/app/runtime/pulse.db}
      PULSE_IMAP_HOST: ${PULSE_IMAP_HOST:-}
      PULSE_IMAP_PORT: ${PULSE_IMAP_PORT:-993}
      PULSE_IMAP_USERNAME: ${PULSE_IMAP_USERNAME:-}
      PULSE_IMAP_PASSWORD: ${PULSE_IMAP_PASSWORD:-}
      PULSE_IMAP_MAILBOX: ${PULSE_IMAP_MAILBOX:-INBOX}
      PULSE_POLL_MAX_MESSAGES: ${PULSE_POLL_MAX_MESSAGES:-10}
    ports:
      - "${PULSE_API_PORT:-8000}:8000"
    volumes:
      - ./runtime:/app/runtime
      - ./app:/app/app
      - ./tests:/app/tests
    restart: unless-stopped
